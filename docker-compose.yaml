services: 
    hub:
        image: seleniarm/hub:4.15
        ports:
        - 4444:4444
        environment:
            - GRID_MAX_SESSION=16
            - GRID_BROWSER_TIMEOUT=300
            - GRID_TIMEOUT=300
        networks:
            - selenium-grid
    chrome:
        image: seleniarm/node-chromium:4.15
        shm_size: '2g'
        depends_on:
        - hub
        environment:
        - SE_EVENT_BUS_HOST=hub
        - SE_EVENT_BUS_PUBLISH_PORT=4442
        - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
        - SE_VNC_NO_PASSWORD=1
        - HUB_HOST=selenium-hub
        - HUB_PORT=4444
        - NODE_MAX_INSTANCES=4
        - NODE_MAX_SESSION=4
        networks:
            - selenium-grid

    firefox:
        image: seleniarm/node-firefox:4.15
        shm_size: '4g'
        depends_on:
        - hub
        environment:
        - SE_EVENT_BUS_HOST=hub
        - SE_EVENT_BUS_PUBLISH_PORT=4442
        - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
        - SE_VNC_NO_PASSWORD=1
        - HUB_HOST=selenium-hub
        - HUB_PORT=4444
        - NODE_MAX_INSTANCES=4
        - NODE_MAX_SESSION=4
        networks:
            - selenium-grid