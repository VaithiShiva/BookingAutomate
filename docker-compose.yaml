services:
    hub:
        image: selenium/hub:latest
        platform: linux/amd64  # Fix for Apple Silicon
        container_name: selenium-hub
        ports:
            - "4444:4444"
        environment:
            - GRID_MAX_SESSION=16
            - GRID_BROWSER_TIMEOUT=300
            - GRID_TIMEOUT=300
        networks:
            - selenium-grid

    chrome:
        image: selenium/node-chrome:latest
        platform: linux/amd64  # Fix for Apple Silicon
        container_name: selenium-chrome
        shm_size: '2g'
        depends_on:
            - hub
        environment:
            - SE_EVENT_BUS_HOST=hub
            - SE_EVENT_BUS_PUBLISH_PORT=4442
            - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
            - SE_VNC_NO_PASSWORD=1
            - NODE_MAX_INSTANCES=4
            - NODE_MAX_SESSION=4
        networks:
            - selenium-grid

    firefox:
        image: selenium/node-firefox:latest
        platform: linux/amd64  # Fix for Apple Silicon
        container_name: selenium-firefox
        shm_size: '4g'
        depends_on:
            - hub
        environment:
            - SE_EVENT_BUS_HOST=hub
            - SE_EVENT_BUS_PUBLISH_PORT=4442
            - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
            - SE_VNC_NO_PASSWORD=1
            - NODE_MAX_INSTANCES=2  # Reduced for stability
            - NODE_MAX_SESSION=2    # Reduced for stability
            - SE_START_XVFB=true    # Enable virtual display
            - SE_OPTS=--log-level INFO
            - JAVA_OPTS=-Dwebdriver.firefox.logfile=/tmp/firefox.log
            - SE_NODE_OVERRIDE_MAX_SESSIONS=true
        security_opt:
            - seccomp:unconfined  # Helps with Firefox sandboxing issues
        networks:
            - selenium-grid

networks:
    selenium-grid:
        driver: bridge