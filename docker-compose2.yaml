services:
    hub:
        image: selenium/hub:latest
        platform: linux/arm64  # Fix for Apple Silicon
        container_name: selenium-hub
        ports:
            - "4442:4442"
            - "4443:4443"
            - "4444:4444"
        environment:
            - GRID_MAX_SESSION=16
            - GRID_BROWSER_TIMEOUT=300
            - GRID_TIMEOUT=300
        networks:
            - selenium-grid

    chrome:
        image: selenium/node-chromium:latest
        platform: linux/arm64  # Fix for Apple Silicon
        shm_size: '1g'
        environment:
            - SE_EVENT_BUS_HOST=selenium-hub
            - SE_EVENT_BUS_PUBLISH_PORT=4442
            - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
        deploy:
            replicas: 1
        depends_on:
            - hub
        networks:
            - selenium-grid

    firefox:
        image: selenium/node-firefox:latest
        platform: linux/arm64  # Fix for Apple Silicon
        shm_size: '1g'
        environment:
            - SE_EVENT_BUS_HOST=selenium-hub
            - SE_EVENT_BUS_PUBLISH_PORT=4442
            - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
        deploy:
            replicas: 1
        depends_on:
            - hub
        security_opt:
            - seccomp:unconfined  # Helps with Firefox sandboxing issues
        networks:
            - selenium-grid

networks:
    selenium-grid:
        driver: bridge